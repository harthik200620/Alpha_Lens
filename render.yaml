services:
  - type: web
    name: alpha-lens
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    # Gunicorn — 1 worker (preserves all module-level state including
    # background workers + caches), 4 threads (was 8 — each thread holds a
    # request context; on Render's 512MB free tier this was contributing to
    # OOM. 4 still handles concurrent requests without serializing on typical
    # traffic). --timeout 90 leaves headroom over Cloudflare's 60s edge
    # timeout. Chdir into backend/ so the app module is importable.
    startCommand: gunicorn --chdir backend --workers 1 --threads 4 --bind 0.0.0.0:$PORT --timeout 90 --access-logfile - app:app
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: alpha-lens-db
          property: connectionString
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY_1
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: GEMINI_API_KEY_3
        sync: false
      - key: GEMINI_API_KEY_4
        sync: false
      - key: GEMINI_API_KEY_5
        sync: false
      - key: GEMINI_API_KEY_6
        sync: false
      - key: GEMINI_API_KEY_7
        sync: false
      - key: GEMINI_API_KEY_8
        sync: false
      - key: GEMINI_API_KEY_9
        sync: false
      - key: GEMINI_API_KEY_10
        sync: false
      - key: GEMINI_API_KEY_11
        sync: false
      - key: GEMINI_API_KEY_12
        sync: false
      - key: GEMINI_API_KEY_13
        sync: false
      - key: GEMINI_API_KEY_14
        sync: false
      - key: GEMINI_API_KEY_15
        sync: false
      - key: GEMINI_API_KEY_16
        sync: false
      - key: GEMINI_API_KEY_17
        sync: false
      - key: GEMINI_API_KEY_18
        sync: false
      - key: GEMINI_API_KEY_19
        sync: false
      - key: GEMINI_API_KEY_20
        sync: false
      - key: GEMINI_API_KEY_21
        sync: false
      - key: GEMINI_API_KEY_22
        sync: false
      - key: GEMINI_API_KEY_23
        sync: false
      # List 2 keys — fallback pool (24-35), engaged when all List 1 keys are exhausted
      - key: GEMINI_API_KEY_24
        sync: false
      - key: GEMINI_API_KEY_25
        sync: false
      - key: GEMINI_API_KEY_26
        sync: false
      - key: GEMINI_API_KEY_27
        sync: false
      - key: GEMINI_API_KEY_28
        sync: false
      - key: GEMINI_API_KEY_29
        sync: false
      - key: GEMINI_API_KEY_30
        sync: false
      - key: GEMINI_API_KEY_31
        sync: false
      - key: GEMINI_API_KEY_32
        sync: false
      - key: GEMINI_API_KEY_33
        sync: false
      - key: GEMINI_API_KEY_34
        sync: false
      - key: GEMINI_API_KEY_35
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      # NewsAPI.ai / Event Registry — finance-only news fetcher. Secret: set the
      # value in the Render dashboard (sync:false keeps it out of the blueprint).
      - key: EVENTREGISTRY_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: SM_GEMINI_MODEL
        value: google/gemini-2.5-flash

databases:
  - name: alpha-lens-db
    databaseName: alpha_lens
    plan: free
    region: singapore
