services:
  - type: web
    name: alpha-lens
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python backend/app.py
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: alpha-lens-db
          property: connectionString
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY_1
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: GEMINI_API_KEY_3
        sync: false
      - key: GEMINI_API_KEY_4
        sync: false
      - key: GEMINI_API_KEY_5
        sync: false
      - key: GEMINI_API_KEY_6
        sync: false
      - key: GEMINI_API_KEY_7
        sync: false
      - key: GEMINI_API_KEY_8
        sync: false
      - key: GEMINI_API_KEY_9
        sync: false
      - key: GEMINI_API_KEY_10
        sync: false
      - key: GEMINI_API_KEY_11
        sync: false
      - key: GEMINI_API_KEY_12
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: SM_GEMINI_MODEL
        value: google/gemini-2.5-flash

databases:
  - name: alpha-lens-db
    databaseName: alpha_lens
    plan: free
    region: singapore
